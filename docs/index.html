Clifford algebras", "year": 2020, "status": "unreviewed", "arxiv_id": "2011.05171", "pdf": "https://arxiv.org/pdf/2011.05171.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1344, "title": "Clifford algebra-parametrized octonions and generalizations", "year": 2006, "status": "unreviewed", "arxiv_id": "0603053", "pdf": "https://arxiv.org/pdf/0603053.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1346, "title": "Lorentz-Equivariant Geometric Algebra Transformers for High-Energy Physics", "year": 2024, "status": "approved", "arxiv_id": "2405.14806", "pdf": "https://arxiv.org/pdf/2405.14806.pdf", "figs": [["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\amplitudes_data.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\amplitudes_multiplicity.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\data_efficiency_AUC.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\data_efficiency_NLL.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\distributions.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\gatr4hep2.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\multiplicity_AUC.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\multiplicity_NLL.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\timing_eval_tr.pdf", ".pdf"], ["arxiv\\2405.14806_Lorentz-Equivariant_Geometric_Algebra_Tr\\source\\figures\\traj_pt.pdf", ".pdf"]], "tc": "\n\\section{Geometric algebra}\n\\label{app:ga}\n\nGeometric algebras are mathematical objects that were initially used for physics. Although they have been used in machine learning for decades~\\citep{bayro1996new}, they have seen a recent uptick in popularity~\\citep{Lounesto2001-vu, doran2003geometric, brandstetter2022clifford, ruhe2023geometric, brehmer2023geometric, ruhe2023clifford}. In this section, we will introduce geometric algebras and the relevant concepts.\n\nAn algebra is a vector space that is equipped with an associative bilinear product.\nGiven a vector space $V$ with a symmetric bilinear inner product, we can construct an algebra $\\alg{V}$, called the geometric or Clifford algebra, in the following way: choose an orthogonal basis $e_i$ of the original $d$-dimensional vector space $V$. Then, the algebra has $2^d$ dimensions with a basis given by elements $e_{j_1}e_{j_2}...e_{j_k}=:e_{j_1j_2...j_k}$, with $1 \\le j_1 &lt; j_2 &lt; ... &lt; j_k \\le d$, $0 \\le k \\le d$.\nFor example, for $V=\\R^3$, with orthonormal basis $e_1,e_2,e_3$, a basis for the algebra $\\alg{R^3}$ is\n\\begin{equation}\n1, e_1, e_2, e_3, e_{12}, e_{13}, e_{23}, e_{123} \\,.\n\\label{eq:euc-ga-basis}\n\\end{equation}\nAn algebra element spanned by basis elements with $k$ indices is called a $k$-vector or a vector of \\emph{grade} $k$. A generic element whose basis elements can have varying grades is called a \\emph{multivector}. A multivector $x$ can be projected to a $k$-vector with the grade projection $\\langle x\\rangle_k$.\n\nThe product on the algebra, called the geometric product, is defined to satisfy $e_ie_j=-e_je_i$ if $i\\neq j$ and $e_ie_i=\\langle e_i, e_i\\rangle$, which by bilinearity and associativity fully specifies the algebra. \nGiven an algebra $\\alg{V}$, there is a group $\\gpin{V}$ that is generated by the $1$-vectors in the algebra with norm $\\pm 1$, and whose group product is the geometric product. This group has a linear action $\\rho: \\gpin{V} \\times \\alg{V} \\to \\alg{V}$ on the algebra defined suc\n\n... (truncated)", "notes": ["[claim] Lorentz-Equivariant Geometric Algebra Transformers use Clifford algebra to build transformers that respect Lorentz symmetry for high-energy physics."]}, {"id": 1347, "title": "Geometric Clifford Algebra Networks", "year": 2023, "status": "approved", "arxiv_id": "2302.06594", "pdf": "https://arxiv.org/pdf/2302.06594.pdf", "figs": [["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\fluid_experiment.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\image.png", ".png"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\main-sw-fields.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\plot_sw-gca-unet-trajs_4_0.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\plot_sw-gca-unet-trajs_4_1.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\plot_sw-gca-unet-trajs_4_2.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\plot_sw-unet-trajs_4_0.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\plot_sw-unet-trajs_4_1.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\plot_sw-unet-trajs_4_2.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\pred_3.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\steven_image_0.png", ".png"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\steven_image_1.png", ".png"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\steven_image_intro.png", ".png"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\target_3.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\test.pdf", ".pdf"], ["arxiv\\2302.06594_Geometric_Clifford_Algebra_Networks\\source\\figures\\tetris_experiment.pdf", ".pdf"]], "tc": "\n\\documentclass{article}\n\n\\usepackage[algo2e]{algorithm2e} \n\\usepackage{mathtools}\n\\usepackage{microtype}\n\\usepackage{graphicx}\n\\u  "tc": "", "notes": []}, {"id": 1367, "title": "Hecke Algebra Representations in Ideals Generated by q-Young Clifford Idempotents", "year": 1999, "status": "unreviewed", "arxiv_id": "9908062", "pdf": "https://arxiv.org/pdf/9908062.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1368, "title": "GLGENN: A Novel Parameter-Light Equivariant Neural Networks Architecture Based on Clifford Geometric Algebras", "year": 2025, "status": "unreviewed", "arxiv_id": "2506.09625", "pdf": "https://arxiv.org/pdf/2506.09625.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1369, "title": "From Data to the p-Adic or Ultrametric Model", "year": 2008, "status": "approved", "arxiv_id": "0809.0492", "pdf": "https://arxiv.org/pdf/0809.0492.pdf", "figs": [["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\cas2x-ca.pdf", ".pdf"], ["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\novelty10.pdf", ".pdf"], ["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\NumMonths.pdf", ".pdf"], ["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\strong_triangular_inequality.pdf", ".pdf"], ["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\top-of-hier.pdf", ".pdf"], ["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\triangular_inequality.pdf", ".pdf"], ["arxiv\\0809.0492_From_Data_to_the_p-Adic_or_Ultrametric_M\\source\\xtabhr-cclust.pdf", ".pdf"]], "tc": "\\documentclass{article}\n\\usepackage{graphicx}\n\\usepackage{graphics}\n\\usepackage{amsfonts}\n\\usepackage{marvosym}\n\\newcommand{\\R}{\\mathbb{R}}\n\\newcommand{\\Z}{\\mathbb{Z}}\n\n\\begin{document}\n\\title{From Data to the p-Adic or Ultrametric Model}\n\n\\author{Fionn Murtagh  \\\\\nScience Foundation Ireland, Wilton Place, Dublin 2, Ireland, and  \\\\\nDepartment of Computer Science, Royal Holloway, University of \nLondon \\\\ Egham TW20 0EX, England \\\\\nEmail: fmurtagh@acm.org}\n\n\\maketitle\n\n\\begin{abstract}\nWe model anomaly and change in data by embedding the data in an\nultrametric space.  Taking our initial data as cross-tabulation \ncounts (or other input data formats), Correspondence Analysis allows\nus to endow the information space with a Euclidean metric. We then \nmodel anomaly or change by an induced ultrametric.  \nThe induced ultrametric that we are particularly interested in \ntakes a sequential -- e.g.\\ temporal -- ordering of the data into \naccount.  We apply this work to the flow of narrative expressed in \nthe film script of the Casablanca movie; and to the evolution between \n1988 and 2004 of the Colombian social conflict and violence.   \n\\end{abstract}\n\\maketitle\n\n\n\\section{Modeling of Anomaly or Change: Introduction}\n\nThe data mining and data analysis challenges addressed are the \nfollowing. \n(i) Great masses of data, textual and otherwise, need to be \nexploited and decisions need to be made.  Correspondence Analysis \nhandles multivariate numerical and symbolic data with ease. \n(ii) Structures and interrelationships evolve in time.\n(iii) We must consider a complex web of relationships.\n(iv) We need to address all these issues from data sets and data flows.   \n\nVarious aspects of how we respond to these challenges will be discussed \nin this article, complemented by the Appendix.   \nWe will look at how this works, using the Casablanca film script,\nand data from the long Colombian civil strife involving government, guerrillas,\nparamilitaries and civilians. \n\n\\section{The Geometry \n\n... (truncated)", "notes": ["[claim] From Data to the p-Adic or Ultrametric Model proposes using p-adic numbers and ultrametric geometry to model hierarchical data structure."]}, {"id": 1370, "title": "p-Adic Statistical Field Theory and Deep Belief Networks", "year": 2022, "status": "approved", "arxiv_id": "2207.13877", "pdf": "https://arxiv.org/pdf/2207.13877.pdf", "figs": [], "tc": "\\documentclass[reqno]{amsart}%\n\\usepackage{amsfonts}\n\\usepackage{amsmath}\n\\us }\n\\newcommand\\mycommfont[1]{\\footnotesize\\ttfamily\\textcolor{blue}{#1}}\n\\SetCommentSty{mycommfont}\n\\SetKwInput{KwInput}{Input}                %\n\\SetKwInput{KwOutput}{Output}  \n\\SetKwInput{KwInitialization}{Initialization}\n\n\n%\n\\newtheorem{remark}{Remark}\n\\newtheorem{condition}{Condition}\n\\newtheorem{definition}{Definition}\n\\newtheorem{problem}{Problem}\n\\newtheorem{assumption}{Assumption}\n\\newtheorem{theorem}{Theorem}\n%\n\\newtheorem{corollary}{Corollary}\n\\newtheorem{lemma}{Lemma}\n\\newtheorem{proposition}{Proposition}\n%\n\\newtheorem{property}{Property}\n\n\n\\newcommand\\blfootnote[1]{%\n\t\\begingroup\n\t\\renewcommand\\thefootnote{}\\footnote{#1}%\n\t\\addtocounter{footnote}{-1}%\n\t\\endgroup\n}\n\n\n\\DeclareMathAlphabet{\\mathbsf}{OT1}{cmss}{bx}\n\n... (truncated)", "notes": ["[finding] On Computationally Efficient Learning of Exponential Family Distributions studies efficient algorithms for exponential families relevant to energy-based models."]}, {"id": 1467, "title": "Relay: a new IR for machine learning frameworks", "year": 2018, "status": "approved", "arxiv_id": "1810.00952", "pdf": "https://arxiv.org/pdf/1810.00952.pdf", "figs": [["arxiv\\1810.00952_Relay_a_new_IR_for_machine_learning_fram\\source\\figures\\current_tvm_stack.pdf", ".pdf"], ["arxiv\\1810.00952_Relay_a_new_IR_for_machine_learning_fram\\source\\figures\\relay_stack_mapl.pdf", ".pdf"], ["arxiv\\1810.00952_Relay_a_new_IR_for_machine_learning_fram\\source\\figures\\stack_tvm_mapl.pdf", ".pdf"], ["arxiv\\1810.00952_Relay_a_new_IR_for_machine_learning_fram\\source\\submission-00.pdf", ".pdf"]], "tc": "\\section{Background and Related Work}\n\\label{background}\n\nCurrent DL IRs, including NNVM&#x27;s current\nrepresentation, are heavily inspired by dataflow programming and\nrelated computation graph abstractions made popular by previous frameworks.\n\nFor example, TensorFlow \\cite{tensorflow} is an iteration on previous work at Google, such\nas DistBelief \\cite{distbelief}. These frameworks have evolved out of dataflow\nprogramming paradigms in which the abstractions are operators with input and\noutput connections. The semantics provided by these languages have been\nsketched in previous work \\cite{tf_comp_model}.\n\nTensorFlow employs a dataflow graph of primitive operators extended with restricted control\nedges to represent differentiable programs. This representation is sufficient\nfor many state-of-the-art models and provides an implementation of reverse mode\nautomatic differentiation~{\\cite{ad_survey, tensorflow}}.\n%\nTensorFlow can be viewed as a deeply embedded DSL (eDSL), where the result of executing\nuser&#x27;s Python script is a computation graph which can then be optimized and\ntransformed before execution.\n%\nFurthermore, because the graph only exposes high-level nodes, it is possible\nfor the program to be portable to heterogeneous devices, and executing a sub-graph\non a given device requires implementation of only those operators for the device.\n Unfortunately, this programming model has limitations.\n%\nBecause the topology is fixed before execution, TensorFlow does not lend itself\nwell to certain applications. As an example, unmodified TensorFlow does not support\nbuilding models where the shape of the computation graph is dependent on the input.\nWhile there does exist a library to mitigate this particular problem\n(see \\cite{tensorflowfold}), this pattern suggests that should new dependencies become\nof interest in the future, similar libraries would also have to be written to address each one,\nentailing considerable engineering effort.\n\nDynamic frameworks such as Chainer \\cite{\n\n... (truncated)", "notes": ["[claim] Relay introduces a high-level intermediate representation for machine learning frameworks that enables cross-optimization across computational graphs."]}, {"id": 1478, "title": "Framework for Inferring Following Strategies from Time Series of Movement Data", "year": 2019, "status": "unreviewed", "arxiv_id": "1911.01366", "pdf": "https://arxiv.org/pdf/1911.01366.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1479, "title": "Tiramisu: A Polyhedral Compiler for Expressing Fast and Portable Code", "year": 2018, "status": "approved", "arxiv_id": "1804.10694", "pdf": "https://arxiv.org/pdf/1804.10694.pdf", "figs": [["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\fista.pdf", ".pdf"], ["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\heatmap.pdf", ".pdf"], ["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\sgemm_performance_CPU.pdf", ".pdf"], ["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\sgemm_performance_GPU.pdf", ".pdf"], ["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\tiramisu_heatmap.pdf", ".pdf"], ["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\tiramisu_large_applications.pdf", ".pdf"], ["arxiv\\1804.10694_Tiramisu_A_Polyhedral_Compiler_for_Expre\\source\\tiramisudist.pdf", ".pdf"]], "tc": "%\\vspace{-0.25cm}\n\\section*{Acknowledgements}\nThis work was supported by the ADA Research Center, a JUMP Center co-sponsored by SRC and DARPA.", "notes": ["[claim] Tiramisu uses polyhedral compilation techniques to express and optimize stencil and tensor computations with a scheduling language."]}, {"id": 1487, "title": "TIRAMISU: A Polyhedral Compiler for Dense and Sparse Deep Learning", "year": 2020, "status": "unreviewed", "arxiv_id": "2005.04091", "pdf": "https://arxiv.org/pdf/2005.04091.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1488, "title": "Data Encoding for Byzantine-Resilient Distributed Optimization", "year": 2019, "status": "unreviewed", "arxiv_id": "1907.02664", "pdf": "https://arxiv.org/pdf/1907.02664.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1489, "title": "Byzantine-Resilient SGD in High Dimensions on Heterogeneous Data", "year": 2020, "status": "approved", "arxiv_id": "2005.07866", "pdf": "https://arxiv.org/pdf/2005.07866.pdf", "figs": [], "tc": "\\begin{abstract}\nWe study distributed stochastic gradient descent (SGD) in the master-worker architecture under Byzantine attacks. %, where, in each SGD iteration, the corrupt workers may send arbitrary gradients to master to disrupt the gradient aggregation. \nWe consider heterogeneous data model, where different workers may have different local datasets, and we do not make any probabilistic assumption on data generation. \n%We propose two Byzantine-resilient SGD algorithms, depending on whether workers send full gradients or compressed gradients.  \nAt the core of our algorithm, we use the polynomial-time outlier-filtering procedure for robust mean estimation proposed by Steinhardt et al.\\ (ITCS 2018) %(which was developed for robust mean estimation in high dimensions) \nto filter-out corrupt gradients.\n% and compute an approximation of the average of uncorrupt gradients.\nIn order to be able to apply their filtering procedure in our {\\em heterogeneous} data setting where workers compute {\\em stochastic} gradients, we derive a new matrix concentration result, which may be of independent interest.\n%bound by generalizing a recent result from Charikar et al.\\ (STOC 2017), which was developed to tackle several problems in robust learning.\n\nWe provide convergence analyses for smooth strongly-convex and non-convex objectives. \nWe derive our results under the bounded variance assumption on local stochastic gradients and a {\\em deterministic} condition on datasets, namely, gradient dissimilarity; and for both these quantities, we provide concrete bounds in the statistical heterogeneous data model.\n%, and give {\\em dimension-independent} approximation error guarantees, provided that workers use a sufficiently large mini-batch size. \n%We assume these functional properties (e.g., smoothness, convexity, etc.) only for the global objective function, and the local objective functions (defined by the local datasets) at different workers may be arbitrary. \nWe give a trade-off between \n\n... (truncated)", "notes": ["[finding] Byzantine-Resilient SGD in High Dimensions on Heterogeneous Data provides robustness guarantees for distributed SGD, relevant to understanding noise in deep learning optimization."]}, {"id": 1492, "title": "Learning Representations from Dendrograms", "year": 2018, "status": "unreviewed", "arxiv_id": "1812.09225", "pdf": "https://arxiv.org/pdf/1812.09225.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1530, "title": "Optimizing Edge AI: A Comprehensive Survey on Data, Model, and System Strategies", "year": 2025, "status": "approved", "arxiv_id": "2503.06027", "pdf": "https://arxiv.org/pdf/2503.06027.pdf", "figs": [], "tc": "", "notes": ["[finding] Optimizing Edge AI surveys data, model, and system-level optimization techniques for deploying AI at the edge."]}, {"id": 1538, "title": "Relax: Composable Abstractions for End-to-End Dynamic Machine Learning", "year": 2023, "status": "approved", "arxiv_id": "2311.02103", "pdf": "https://arxiv.org/pdf/2311.02103.pdf", "figs": [], "tc": "", "notes": ["[claim] Relax introduces composable abstractions for end-to-end dynamic machine learning compilation, extending MLIR-based compilation to dynamic shapes."]}, {"id": 1544, "title": "Accelerating Machine Learning Systems via Category Theory: Applications to Spherical Attention for Gene Regulatory Networks", "year": 2025, "status": "approved", "arxiv_id": "2505.09326", "pdf": "https://arxiv.org/pdf/2505.09326.pdf", "figs": [["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\benchmark.pdf", ".pdf"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\alternative_attention.png", ".png"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\attention_expansion.png", ".png"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\comparison.png", ".png"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\full_model.png", ".png"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\fusion_theorems.png", ".png"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\lowlevel.png", ".png"], ["arxiv\\2505.09326_Accelerating_Machine_Learning_Systems_vi\\source\\diagrams\\normalized_contraction.png", ".png"]], "tc": "%Deadline\n%April 12th 2025\n\n%AGI 2025\n%https://agi-conf.org/2025/call-for-papers/\n\n\\documentclass[runningheads]{llncs}\n\\usepackage[T1]{fontenc}\n\\usepackage{graphicx}\n\\usepackage{amsmath}\n\\usepackage{amssymb}\n\\let\\proof\\relax\n\\let\\endproof\\relax\n\\usepackage{amsthm}\n\\usepackage{placeins}\n\\usepackage{hyperref}\n\\usepackage{floatrow}\n\\usepackage{color}\n\\renewcommand\\UrlFont{\\color{blue}\\rmfamily}\n\\urlstyle{rm}\n\n% \\usepackage{natbib}\n\\theoremstyle{definition}\n\n\\begin{document}\n\n\\title{Accelerating Machine Learning Systems via Category Theory: Applications to Spherical Attention for Gene Regulatory Networks}\n\n\n\n\\titlerunning{Accelerating Machine Learning Systems via Category Theory}\n\n% \\author{Anonymous}\n% \\institute{}\n\n\\author{\nVincent Abbott\\inst{1} \n\\and \nKotaro Kamiya\\inst{2}\n\\and\nGerard Glowacki\\inst{3} \n\\and\nYu Atsumi\\inst{2} \n\\and\nGioele Zardini\\inst{1}\n\\and\nYoshihiro Maruyama\\inst{3} \n}\n\n\\authorrunning{V. Abbott et al.}\n\n\\institute{Laboratory for Information and Decision Systems, Massachusetts Institute of Technology, Cambridge, USA\\\\\n\\email{\\{vtabbott,gzardini\\}@mit.edu}\n\\and\nSyntheticGestalt, Tokyo, Japan\\\\\n\\email{\\{k.kamiya,y.atsumi\\}@syntheticgestalt.com}\n\\and\nSchool of Informatics, Nagoya University, Nagoya, Japan\\\\\n\\email{\\{glowacki,maruyama\\}@i.nagoya-u.ac.jp}\n\\thanks{Supported by JST (JPMJMS2033; JPMJPR24K9; JPMJFR206P).}\n}\n\n\n\\maketitle\n\n\\begin{abstract}\n\nHow do we enable artificial intelligence model 200-fp16-tc1.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\gh200-fp8-tc1.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\one-col-figs.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\qwen_rmse_kde_3curves_1000_causal.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\qwen_rmse_kde_3curves_1000_global.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\qwen_rmse_kde_3curves_1000_gqa.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\rtx5090-fp16-baseline1.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\rtx5090-fp16-tc1.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\throughput_plot.pdf", ".pdf"], ["arxiv\\2604.14825_Nautilus_An_Auto-Scheduling_Tensor_Compi\\source\\figures\\throughput_plot_5090.pdf", ".pdf"]], "tc": "Modern attention-based machine learning (ML) models\nare essential for language, vision, and other emerging tasks in artificial intelligence\n\\cite{gpt5,image-gen-paper,audio-gen-paper}.\nTo efficiently deploy these models on GPUs, system engineers need tools to bridge the performance gap\nbetween a \\emph{math-like model specification}, such as PyTorch or JAX code, and efficient\nlow-level code that maximally utilizes the underlying hardware.\nToday, the connection between math-like specification and efficient execution on increasingly varied hardware\nis challenged ---\nexisting tools are either too hard to use, requiring expertise in rapidly-evolving low-level\nhardware details, or produce \\mbox{programs that are not sufficiently performant.}\n\nThe most common approach today is writing manually optimized kernels in hardware vendor languages\nlike CUDA~\\cite{cuda} and CUTLASS~\\cite{cutlass}. They achieve high performance and have been\nused in PyTorch~\\cite{pytorch} and TensorFlow~\\cite{tensorflow}.\nHowever, programming in these low-level languages requires significant hardware and\nalgorithmic expertise and does not scale to rapidly evolving GPU architectures and ML models.\nOn the opposite side, schedule-based tensor compilers such as Halide~\\cite{halide} and TVM~\\cite{tvm}\noptimize a high-level specification of the ML operator {in a math-like tensor language.}\nThis design offloads the obligation of optimization from the programmer to the compiler,\nwhich needs to search in a complex design space of \\emph{schedules}\n(sequence of transformations) to find an optimal kernel on the target GPU.\nBut, an unconstrained, exhaustive search in this design space is intractable, thus\ntoday&#x27;s high-level tensor compilers fail to match the performance \\mbox{of handwritten code}.\n\nAs a tentative trade-off between programmability and efficiency,\ntile-based compilers and languages,\nincluding Triton~\\cite{triton}, Pallas~\\cite{pallas}, and TileLang~\\cite{tilelang},\nhave emerged as an abstraction l\n\n... (truncated)", "notes": ["[claim] Nautilus is an auto-scheduling tensor compiler for efficient tiled GPU kernel generation with learned cost models."]}, {"id": 1555, "title": "Dual Accuracy-Quality-Driven Neural Network for Prediction Interval Generation", "year": 2022, "status": "unreviewed", "arxiv_id": "2212.06370", "pdf": "https://arxiv.org/pdf/2212.06370.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1556, "title": "Categorical Foundations of Gradient-Based Learning", "year": 2022, "status": "approved", "arxiv_id": "2103.01931", "pdf": "https://arxiv.org/pdf/2103.01931.pdf", "figs": [["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\animation\\animate_0.pdf", ".pdf"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\animation\\animate_1.pdf", ".pdf"], ["arxiv\\2103.01931_Categorical_Fo \\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\animation\\animate_7.pdf", ".pdf"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\animation\\animate_8.pdf", ".pdf"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\animation\\animate_9.pdf", ".pdf"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\autoencoder_full.jpeg", ".jpeg"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\deep_dreaming_full.jpeg", ".jpeg"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\informal-sketch-tex.png", ".png"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\para_rdc.jpeg", ".jpeg"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\paralens-full-learner-opaque.pdf", ".pdf"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\parametriclens.png", ".png"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\roadmap.png", ".png"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\sketchlearning2.png", ".png"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\supervised.jpeg", ".jpeg"], ["arxiv\\2103.01931_Categorical_Foundations_of_Gradient-Base\\source\\figures\\supervised_full.jpeg", ".jpeg"]], "tc": "We propose a categorical semantics of gradient-based machine learning algorithms in\nterms of lenses, parametrised maps, and reverse derivative categories.  This foundation provides a powerful explanatory and unifying framework: it encompasses a variety of gradient\ndescent algorithms such as ADAM, AdaGrad, and Nesterov momentum,\nas well as a variety of loss functions such as as MSE and Softmax cross-entropy, shedding new light on their similarities and differences.  Our approach to gradient-based learning has examples generalising beyond the familiar continuous domains (modelled in categories of smooth maps) and can be realized in the discrete setting of boolean circuits.\nFinally, we demonstrate the practical significance of our framework with an implementation in Python.\n", "notes": ["[claim] Categorical Foundations of Gradient-Based Learning derives backpropagation from categorical principles using reverse derivative categories."]}, {"id": 1558, "title": "An Enriched Category Theory of Language: From Syntax to Semantics", "year": 2022, "status": "approved", "arxiv_id": "2106.07890", "pdf": "https://arxiv.org/pdf/2106.07890.pdf", "figs": [], "tc": "\\documentclass[11pt]{amsart}\n%\\usepackage{geometry}[margin=1.25in]\n\\usepackage{amsmath,amsfonts,amsthm,mathrsfs,amssymb,cancel}\n\\usepackage[dvipsnames,table,xcdraw]{xcolor}\n\\usepackage{times}\n\\usepackage{relsize}\n\\usepackage[foot]{amsaddr}\n\\usepackage{tikz}\n\\usetikzlibrary{cd,arrows}\n\t\\tikzset{thick/.style={line width=.4mm}}\n\t\\tikzstyle{dot}=[circle,thick,fill=red!60]\n\t\\tikzstyle{tinydot}=[circle,thick,fill=red!60,inner sep=1mm]\n\\usepackage[linktocpage=true]{hyperref}\n\\hypersetup{\n    hypertexnames=true,\n    colorlinks=true,\n    linkcolor=blue,  \n    urlcolor=blue,\n    citecolor=blue\n}\n\n\\newcommand{\\colim}{\\operatorname{colim}}\n\n\\theoremstyle{definition}\n\\newtheorem{definition}{Definition}\n\\newtheorem*{definition*}{Definition}\n\\newtheorem{example}{Example}\n\n\\theoremstyle{theorem}\n\\newtheorem{lemma}{Lemma}\n\\newtheorem{theorem}{Theorem}\n\\newtheorem{corollary}{Corollary}\n\n\\title{An enriched category theory of language:  from syntax to semantics}\n\\author{Tai-Danae Bradley$^1$}\n\\address{$^1$X, The Moonshot Factory and Sandbox@Alphabet, Mountain View, CA}\n\\email{tai.danae@math3ma.com}\n\\author{John Terilla$^2$}\n\\address{$^2$The City University of New York and Tunnel, New York, NY}\n\\email{jterilla@gc.cuny.edu}\n\\author{Yiannis Vlassopoulos$^3$}\n\\address{$^3$Tunnel, New York, NY}\n\\email{yiannis@tunnel.tech}\n\n\\begin{document}\n\n\\begin{abstract}\nState of the art language models return a natural language text continuation from any piece of input text.  This ability to generate coherent text extensions implies significant sophistication, including a knowledge of grammar and semantics.  In this paper, we propose a mathematical framework for passing from probability distributions on extensions of given texts, such as the ones learned by today&#x27;s large language models, to an enriched category containing semantic information.  Roughly speaking, we model probability distributions on texts as a category enriched over the unit interval. Objects of this category are expressions in language\n\n... (truncated)", "notes": ["[claim] An Enriched Category Theory of Language models syntax and semantics in enriched categories, generalizing the DisCoCat framework."]}, {"id": 1559, "title": "Reverse Derivative Ascent: A Categorical Approach to Learning Boolean Circuits", "year": 2021, "status": "approved", "arxiv_id": "2101.10488", "pdf": "https://arxiv.org/pdf/2101.10488.pdf", "figs": [], "tc": "\\begin{abstract}\n  We introduce \\emph{Reverse Derivative Ascent}: a categorical analogue of gradient based\n  methods for machine learning.\n  Our algorithm is defined at the level of so-called\n  \\emph{reverse differential categories}.\n  It can be used to learn the parameters of models which are expressed as\n  morphisms of such categories.\n  Our motivating example is boolean circuits: we show\n  how our algorithm can be applied to such circuits by using the theory of\n  reverse differential categories.\n  Note our methodology allows us to learn\n  the parameters of boolean circuits \\textit{directly}, in\n  contrast to existing binarised neural network approaches.\n  Moreover, we demonstrate its empirical value by giving experimental\n  results on benchmark machine learning datasets.\n\\end{abstract}\n", "notes": ["[claim] Reverse Derivative Ascent provides a categorical approach to learning boolean functions using reverse derivative categories."]}, {"id": 1573, "title": "Learning Neural Network Architectures using Backpropagation", "year": 2015, "status": "unreviewed", "arxiv_id": "1511.05497", "pdf": "https://arxiv.org/pdf/1511.05497.pdf", "figs": [], "tc": "", "notes": []}, {"id": 1574, "title": "Memorization in Deep Neural Networks: Does the Loss Function matter?", "year": 2021, "status": "unreviewed", "arxiv_id": "2107.09957", "pdf": "https://arxiv.org/pdf/2107.09957.pdf", "figs": [], "tc": "", "notes": []}];
const POOL_PATH = "static export — arXiv PDFs";

// ── helpers ──────────────────────────────────────────────────────────
function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function figHtml(fig) {
  var p = escapeHtml(fig[0]), ext = fig[1], name = p.split('/').pop();
  if (ext === '.pdf')
    return '<div class="figure-item"><embed src="'+p+'" type="application/pdf" width="100%" height="250px"><div class="fig-caption">'+name+'</div></div>';
  return '<div class="figure-item"><img src="'+p+'" alt="'+name+'" loading="lazy"><div class="fig-caption">'+name+'</div></div>';
}

// ── build narrow (accordion) ─────────────────────────────────────────
function renderNarrow(filter) {

    shown++;
    out += '<div class="paper" data-id="'+p.id+'">';
    out += '<div class="paper-header" onclick="togglePaperNarrow(this)">';
    out += '<span class="paper-id">['+p.id+']</span>';
    out += '<span class="paper-title">'+escapeHtml(p.t)+'</span>';
    out += '<span class="paper-year">('+p.y+')</span>';
    out += '<span class="toggle-icon">&#9654;</span></div>';
    out += '<div class="paper-body">';
    out += '<div class="paper-meta"><span>Status: <b>'+escapeHtml(p.st)+'</b></span><span>arXiv:'+escapeHtml(p.a)+'</span></div>';

      out += '<div class="pdf-viewer"><embed src="'+p.pdf+'#view=FitH" type="application/pdf"></div>';
    } else {

    }
    out += '<div class="tex-section">';

    }
    out += '</div></div>';
  });
  out += '</div>';
  out += '<div class="subtitle">'+shown+'/'+PAPERS.length+' papers &middot; Pool: '+POOL_PATH+'</div>';

}

}
function toggleTexNarrow(el) {

    var searchBtnWide = '<a class="btn btn-search" data-pid="'+sel.id+'" onclick="searchBing(this.dataset.pid)">Bing</a>';
    if (sel.pdf) {
      out += '<div class="pdf-toolbar"><span class="pt-title">['+sel.id+'] '+escapeHtml(sel.t)+'</span>';
      out += '<a href="'+sel.pdf+'" target="_blank" class="btn">New Tab</a> '+searchBtnWide+'</div>';
      out += '<div class="pdf-viewer"><embed src="'+sel.pdf+'#view=FitH" type="application/pdf"></div>';
    } else {
      out += '<div style="text-align:center;padding:40px 16px">';
      out += '<div class="placeholder" style="margin-bottom:16px">PDF not available for this paper</div>';
      out += searchBtnWide+'</div>';
    }
  } else {
    out += '<div class="placeholder">Select a paper from the list</div>';
  }
  out += '</div>';

  // ── Right: Figures + TeX ──
  out += '<div class="divider" data-panel="right" onmousedown="startResize(event, \'right\')"></div>';
  out += '<div class="wide-right" id="wide-right">';
  if (sel) {
    if (sel.figs && sel.figs.length) {
      out += '<div class="figures"><h4>Extracted Figures</h4><div class="figure-grid">';
      sel.figs.forEach(function(f) { out += figHtml(f); });
      out += '</div></div>';
    } else {
      out += '<p class="no-figures">No extracted figures</p>';
    }
    out += '<div class="tex-section">';
    out += '<h4>TeX Source <span class="tex-toggle" onclick="toggleTexWide()">(show/hide)</span></h4>';
    out += '<pre id="tex-wide" style="display:none">'+(sel.tc || 'No TeX source available')+'</pre>';
    out += '</div>';
    if (sel.notes && sel.notes.length) {
      out += '<div class="notes-section"><h4>Notes</h4>';
      sel.notes.forEach(function(n) { out += '<div class="note-item">'+escapeHtml(n)+'</div>'; });
      out += '</div>';
    }
  } else {
    out += '<div class="placeholder">Select a paper to view figures</div>';
  }
  out += '</div>';

  out += '</div></div>';
  document.getElementById('app').innerHTML = out;
  loadPanelWidths();
}

function getPaperById(id) {
  for (var i = 0; i < PAPERS.length; i++) { if (PAPERS[i].id === id) return PAPERS[i]; }
  return null;
}

function selectPaper(id) {
  selectedId = id;
  var f = getFilter();
  var scrollTop = 0;
  var listEl = document.getElementById('wide-list');
  if (listEl) scrollTop = listEl.scrollTop;
  renderWide(f);
  setTimeout(function() {
    var newList = document.getElementById('wide-list');
    if (newList && scrollTop > 0) newList.scrollTop = scrollTop;
  }, 0);
}

function toggleTexWide() {
  var el = document.getElementById('tex-wide');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── search ───────────────────────────────────────────────────────────
function getFilter() {
  var el = document.getElementById('search') || document.getElementById('search-wide');
  return el ? el.value.toLowerCase() : '';
}

function onSearch(val) {
  var f = val.toLowerCase();
  if (window.innerWidth >= WIDE_BP) renderWide(f);
  else renderNarrow(f);
}

// ── layout switch ────────────────────────────────────────────────────
var resizeTimer = null;
function onResize() {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    var f = getFilter();
    if (window.innerWidth >= WIDE_BP) renderWide(f);
    else renderNarrow(f);
  }, 200);
}

// ── keyboard nav ─────────────────────────────────────────────────────
function onKeyNav(e) {
  if (window.innerWidth < WIDE_BP) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    var items = document.querySelectorAll('.list-item');
    var idx = -1;
    for (var i = 0; i < items.length; i++) {
      if (items[i].classList.contains('active')) { idx = i; break; }
    }
    if (e.key === 'ArrowDown') idx = Math.min(idx + 1, items.length - 1);
    else idx = Math.max(idx - 1, 0);
    if (idx >= 0 && items[idx]) {
      var id = parseInt(items[idx].getAttribute('data-id'));
      selectPaper(id);
    }
    e.preventDefault();
  }
}

// ── panel resize ─────────────────────────────────────────────────────
var resizeState = null;

function startResize(e, side) {
  e.preventDefault();
  resizeState = { side: side, startX: e.clientX };
  var div = e.target;
  div.classList.add('active');
  document.addEventListener('mousemove', doResize);
  document.addEventListener('mouseup', stopResize);
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
}

function doResize(e) {
  if (!resizeState) return;
  var dx = e.clientX - resizeState.startX;
  var list = document.getElementById('wide-list');
  var right = document.getElementById('wide-right');
  if (resizeState.side === 'left' && list) {
    var w = parseInt(list.offsetWidth) + dx;
    w = Math.max(200, Math.min(500, w));
    list.style.width = w + 'px';
  } else if (resizeState.side === 'right' && right) {
    var w = parseInt(right.offsetWidth) - dx;
    w = Math.max(200, Math.min(600, w));
    right.style.width = w + 'px';
  }
  resizeState.startX = e.clientX;
}

function stopResize(e) {
  if (!resizeState) return;
  document.querySelectorAll('.divider.active').forEach(function(d) { d.classList.remove('active'); });
  document.removeEventListener('mousemove', doResize);
  document.removeEventListener('mouseup', stopResize);
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  // save widths
  var list = document.getElementById('wide-list');
  var right = document.getElementById('wide-right');
  var vals = {};
  if (list) vals.leftW = list.style.width;
  if (right) vals.rightW = right.style.width;
  try { localStorage.setItem('pool_panel_widths', JSON.stringify(vals)); } catch(e) {}
  resizeState = null;
}

function loadPanelWidths() {
  try {
    var vals = JSON.parse(localStorage.getItem('pool_panel_widths'));
    if (vals && vals.leftW) document.getElementById('wide-list').style.width = vals.leftW;
    if (vals && vals.rightW) document.getElementById('wide-right').style.width = vals.rightW;
  } catch(e) {}
  // apply after render
  setTimeout(function() {
    try {
      var vals = JSON.parse(localStorage.getItem('pool_panel_widths'));
      if (vals && vals.leftW) document.getElementById('wide-list').style.width = vals.leftW;
      if (vals && vals.rightW) document.getElementById('wide-right').style.width = vals.rightW;
    } catch(e) {}
  }, 50);
}

// ── init ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', onKeyNav);
window.addEventListener('resize', onResize);

function searchBing(id) {
  var p = getPaperById(parseInt(id, 10));
  if (!p) return;
  var q = encodeURIComponent(p.t);
  window.open('https://www.bing.com/search?q=' + q, '_blank');
}

// clean and index paper data for search
PAPERS.forEach(function(p) {
  p.t = p.title || '';
  p.y = p.year || '?';
  p.st = p.status || 'unreviewed';
  p.a = p.arxiv_id || '';
});

(function init() {
  if (window.innerWidth >= WIDE_BP) renderWide('');
  else renderNarrow('');
})();
</script>
