  <text x="324.0" y="164.5" class="edge-label">(4, 256, 768)</text>
  <path d="M 90.0 442.5 C 130.0 150.0, 518.0 150.0, 558.0 240.0" class="prop-bypass"/>
  <text x="324.0" y="164.0" class="edge-label">(4, 256, 768)</text>
