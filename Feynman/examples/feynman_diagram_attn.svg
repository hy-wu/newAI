<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="360px" style="background:#0f172a; font-family: Inter, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <style>
    .prop-line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .prop-bypass { stroke: #f97316; stroke-width: 2.5; stroke-dasharray: 6,4; fill: none; marker-end: url(#arrow); }
    .prop-attn { stroke: #a855f7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .node-title { fill: #f8fafc; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .node-sub { fill: #94a3b8; font-size: 10px; text-anchor: middle; }
    .edge-label { fill: #cbd5e1; font-size: 10px; text-anchor: middle; background: #1e293b; }
  </style>
  <!-- Title Banner -->
  <text x="400.0" y="30" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Visual Machine Learning Feynman Diagram: transformer_attention_formula</text>
  <!-- Propagator Edges -->
  <path d="M 80 60.0 C 208.0 60.0, 208.0 180.0, 336.0 180.0" class="prop-line"/>
  <text x="208.0" y="112.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 80 140.0 C 208.0 140.0, 208.0 180.0, 336.0 180.0" class="prop-line"/>
  <text x="208.0" y="152.0" class="edge-label">(768, 768)</text>
  <path d="M 80 60.0 C 240.0 60.0, 240.0 120.0, 400.0 120.0" class="prop-line"/>
  <text x="240.0" y="82.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 80 220.0 C 240.0 220.0, 240.0 120.0, 400.0 120.0" class="prop-line"/>
  <text x="240.0" y="162.0" class="edge-label">(768, 768)</text>
  <path d="M 80 60.0 C 272.0 60.0, 272.0 240.0, 464.0 240.0" class="prop-line"/>
  <text x="272.0" y="142.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 80 300.0 C 272.0 300.0, 272.0 240.0, 464.0 240.0" class="prop-line"/>
  <text x="272.0" y="262.0" class="edge-label">(768, 768)</text>
  <path d="M 336.0 180.0 L 528.0 180.0" class="prop-line"/>
  <text x="432.0" y="172.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 400.0 120.0 C 464.0 120.0, 464.0 180.0, 528.0 180.0" class="prop-line"/>
  <text x="464.0" y="142.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 464.0 240.0 C 496.0 240.0, 496.0 180.0, 528.0 180.0" class="prop-line"/>
  <text x="496.0" y="202.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 80 60.0 C 336.0 60.0, 336.0 180.0, 592.0 180.0" class="prop-bypass"/>
  <text x="336.0" y="112.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 528.0 180.0 L 592.0 180.0" class="prop-line"/>
  <text x="560.0" y="172.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 592.0 180.0 L 656.0 180.0" class="prop-line"/>
  <text x="624.0" y="172.0" class="edge-label">(4, 256, 768)</text>
  <path d="M 656.0 180.0 L 720 180.0" class="prop-line"/>
  <text x="688.0" y="172.0" class="edge-label">(4, 256, 768)</text>
  <!-- Vertex Interaction Nodes -->
  <g transform="translate(80,60.0)">
    <rect x="-35" y="-18" width="70" height="36" rx="8" fill="#2563eb" filter="url(#glow)"/>
    <text y="4" class="node-title" font-size="11">x</text>
  </g>
  <g transform="translate(80,140.0)">
    <rect x="-35" y="-18" width="70" height="36" rx="8" fill="#2563eb" filter="url(#glow)"/>
    <text y="4" class="node-title" font-size="11">W_q</text>
  </g>
  <g transform="translate(80,220.0)">
    <rect x="-35" y="-18" width="70" height="36" rx="8" fill="#2563eb" filter="url(#glow)"/>
    <text y="4" class="node-title" font-size="11">W_k</text>
  </g>
  <g transform="translate(80,300.0)">
    <rect x="-35" y="-18" width="70" height="36" rx="8" fill="#2563eb" filter="url(#glow)"/>
    <text y="4" class="node-title" font-size="11">W_v</text>
  </g>
  <g transform="translate(336.0,180.0)">
    <circle r="22" fill="#dc2626" filter="url(#glow)"/>
    <text y="-28" class="node-title">proj_Q</text>
    <text y="4" class="node-title" font-size="10">Contra</text>
  </g>
  <g transform="translate(400.0,120.0)">
    <circle r="22" fill="#dc2626" filter="url(#glow)"/>
    <text y="-28" class="node-title">proj_K</text>
    <text y="4" class="node-title" font-size="10">Contra</text>
  </g>
  <g transform="translate(464.0,240.0)">
    <circle r="22" fill="#dc2626" filter="url(#glow)"/>
    <text y="-28" class="node-title">proj_V</text>
    <text y="4" class="node-title" font-size="10">Contra</text>
  </g>
  <g transform="translate(528.0,180.0)">
    <circle r="22" fill="#9333ea" filter="url(#glow)"/>
    <text y="-28" class="node-title">sdpa_attention</text>
    <text y="4" class="node-title" font-size="10">Attent</text>
  </g>
  <g transform="translate(592.0,180.0)">
    <circle r="22" fill="#ea580c" filter="url(#glow)"/>
    <text y="-28" class="node-title">residual_add</text>
    <text y="4" class="node-title" font-size="10">Residu</text>
  </g>
  <g transform="translate(656.0,180.0)">
    <circle r="22" fill="#475569" filter="url(#glow)"/>
    <text y="-28" class="node-title">layer_norm</text>
    <text y="4" class="node-title" font-size="10">Norm</text>
  </g>
  <g transform="translate(720,180.0)">
    <rect x="-35" y="-18" width="70" height="36" rx="8" fill="#0f172a" filter="url(#glow)"/>
    <text y="4" class="node-title" font-size="11">out</text>
  </g>
</svg>